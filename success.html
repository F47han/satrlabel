<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | Satr</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Montserrat:wght@300;400;600;700&family=Playfair+Display+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --dark-brown: #4a3326;
            --medium-brown: #7a6855;
            --light-brown: #a89a89;
            --off-white: #f9f7f5;
            --white: #ffffff;
            --gold: #c9a84c;
            --gold-light: #e8d08a;
            --transition: all 0.35s ease;
        }

        html { background-color: #111; min-height: 100%; }

        body {
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
            color: var(--white);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 1.5rem 1.5rem;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url('background.jpeg') center center / cover no-repeat;
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(20, 14, 10, 0.75);
            z-index: -1;
        }

        header {
            text-align: center;
            width: 100%;
            max-width: 960px;
            padding: 2rem 0 0;
            position: relative;
            z-index: 10;
        }

        .site-logo {
            font-family: 'Playfair Display SC', serif;
            font-size: clamp(2.6rem, 8vw, 4.8rem);
            font-weight: 400;
            letter-spacing: 0.1em;
            color: var(--white);
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            text-decoration: none;
            display: inline-block;
        }

        nav {
            margin-top: 1.3rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.2);
            flex-wrap: wrap;
        }

        nav a {
            text-decoration: none;
            color: rgba(255,255,255,0.85);
            font-weight: 600;
            font-size: 0.72rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 6px 4px;
            position: relative;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            min-height: 44px;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 70%;
            height: 1.5px;
            background: var(--gold-light);
            transition: var(--transition);
        }

        nav a:hover { color: var(--gold-light); }
        nav a:hover::after { transform: translateX(-50%) scaleX(1); }

        main { width: 100%; max-width: 1200px; margin: 4rem 0; display: flex; justify-content: center; }

        .success-container {
            width: 100%;
            max-width: 600px;
            text-align: center;
            background: rgba(15, 10, 8, 0.88);
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: 18px;
            padding: 4rem 3rem;
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
            position: relative;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
        }

        .checkmark {
            font-size: 3.5rem;
            color: var(--gold-light);
            margin-bottom: 1.5rem;
            text-shadow: 0 2px 10px rgba(201,168,76,0.2);
        }

        .success-container h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            color: var(--white);
            margin-bottom: 1rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .success-container p {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.75);
            line-height: 1.8;
            margin-bottom: 2.5rem;
        }

        .continue-btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
            background-size: 200% auto;
            color: #1a1208;
            text-decoration: none;
            padding: 1rem 2.5rem;
            text-transform: uppercase;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            border-radius: 8px;
            transition: 0.4s;
            border: none;
            cursor: pointer;
        }

        .continue-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(201,168,76,0.35);
        }

        footer {
            width: 100%; max-width: 960px; text-align: center;
            padding: 2rem 1rem; border-top: 1px solid rgba(201,168,76,0.15);
            color: rgba(255,255,255,0.4); margin-top: auto;
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="site-logo">Satr</a>
    <nav>
        <a href="index.html">Home</a>
        <a href="productsatr.html">Products</a>
        <a href="aboutme.html">About</a>
    </nav>
</header>

<main>
    <div class="success-container">
        <div class="checkmark">✓</div>
        <h2>Thank You</h2>
        <p>
            Your order has been confirmed and is being prepared with care.<br>
            You will receive a confirmation email shortly.
        </p>
        <a href="productsatr.html" class="continue-btn">Continue Shopping</a>
    </div>
</main>

<footer>
    <p>&copy; 2026 Satr. Handcrafted with love for the modern Muslimah.</p>
</footer>

<script src="cart.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Clear the cart after successful payment
        if (typeof SatrCart !== 'undefined') {
            SatrCart.clearCart();
        }
    });
</script>
</body>
</html>
