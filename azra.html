<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Satr</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;600;700&family=Playfair+Display+SC:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-brown: #4a3326;
            --medium-brown: #6b4f3f;
            --light-brown: #8c7b6b;
            --cream: #f8f5f2;
            --white: #ffffff;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            color: var(--dark-brown);
            background-color: var(--cream);
            min-height: 100vh;
            line-height: 1.6;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('background.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            opacity: 0.25;
        }

        .announcement-bar {
            width: 100%;
            background: rgba(74, 51, 38, 0.95);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            position: sticky;
            top: 0;
            z-index: 3000;
            color: var(--white);
        }
        .announcement-bar a { color: var(--white); text-decoration: underline; font-weight: 700; }

        header { text-align: center; padding: 2rem 1rem; }
        h1 {
            font-family: 'Playfair Display SC', serif;
            font-size: clamp(2rem, 7vw, 3.5rem);
            letter-spacing: 0.25em;
            font-weight: 300;
            text-transform: uppercase;
            color: var(--dark-brown);
        }
        nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        nav a {
            text-decoration: none;
            color: var(--dark-brown);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            font-weight: 700;
            padding: 8px 12px;
            border-radius: 4px;
            transition: var(--transition);
            min-height: 44px;
            display: flex;
            align-items: center;
        }
        nav a:hover { background: rgba(74, 51, 38, 0.1); }

        .cart-container { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
        .cart-header {
            text-align: center;
            padding: 1.5rem 0;
            border-bottom: 1px solid rgba(74, 51, 38, 0.15);
            margin-bottom: 2rem;
        }
        .cart-header h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            font-weight: 600;
        }

        .cart-empty {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .cart-empty p { font-size: 1.1rem; margin: 1rem 0 2rem; color: var(--light-brown); }
        .cart-empty a {
            display: inline-block;
            background: var(--dark-brown);
            color: var(--white);
            text-decoration: none;
            padding: 0.8rem 2rem;
            border-radius: 4px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            transition: var(--transition);
        }
        .cart-empty a:hover { background: var(--medium-brown); }

        .cart-items {
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .cart-item {
            display: grid;
            grid-template-columns: 100px 1fr auto;
            gap: 1.2rem;
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid rgba(74, 51, 38, 0.1);
            align-items: center;
        }
        .cart-item:last-child { border-bottom: none; }
        .cart-item-image {
            width: 100px; height: 133px;
            border-radius: 8px; overflow: hidden;
            background: #f0ebe6;
        }
        .cart-item-image img { width: 100%; height: 100%; object-fit: cover; }
        .cart-item-details h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem; font-weight: 600; margin-bottom: 0.3rem;
        }
        .cart-item-price { font-size: 1rem; color: var(--medium-brown); font-weight: 600; }
        .cart-item-quantity { display: flex; align-items: center; gap: 0.5rem; }
        .qty-btn {
            width: 32px; height: 32px;
            border: 1px solid var(--dark-brown);
            background: var(--white); color: var(--dark-brown);
            border-radius: 4px; cursor: pointer;
            font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
        }
        .qty-btn:hover { background: rgba(74, 51, 38, 0.1); }
        .qty-value { min-width: 30px; text-align: center; font-weight: 600; }
        .cart-item-remove {
            background: none; border: none; color: var(--light-brown);
            cursor: pointer; font-size: 1.5rem; padding: 0.5rem;
            transition: var(--transition); line-height: 1;
        }
        .cart-item-remove:hover { color: #c0392b; }

        .cart-summary {
            background: var(--white);
            border-radius: 16px;
            padding: 1.5rem;
            margin-top: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .summary-row {
            display: flex; justify-content: space-between;
            padding: 0.8rem 0; border-bottom: 1px solid rgba(74, 51, 38, 0.1);
        }
        .summary-row:last-child {
            border-bottom: none; font-weight: 700; font-size: 1.2rem;
            color: var(--dark-brown); padding-top: 1rem;
        }
        .summary-total { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; }
        .checkout-btn {
            display: block; width: 100%; max-width: 300px;
            margin: 1.5rem auto 0;
            background: var(--dark-brown); color: var(--white);
            text-decoration: none; text-align: center;
            padding: 1rem 2rem; border-radius: 4px;
            font-size: 0.75rem; text-transform: uppercase;
            letter-spacing: 2px; font-weight: 700;
            transition: var(--transition); min-height: 44px;
            display: flex; align-items: center; justify-content: center;
        }
        .checkout-btn:hover { background: var(--medium-brown); }
        .checkout-btn:disabled { background: var(--light-brown); cursor: not-allowed; transform: none; }
        .clear-cart {
            display: block; margin: 1rem auto 0;
            background: none; border: 1px solid var(--light-brown);
            color: var(--light-brown); padding: 0.6rem 1.5rem;
            border-radius: 4px; font-size: 0.7rem;
            text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: var(--transition);
        }
        .clear-cart:hover { background: rgba(140, 123, 107, 0.1); color: var(--dark-brown); }

        footer {
            text-align: center; padding: 3rem 1rem;
            background: rgba(74, 51, 38, 0.92); color: var(--white);
            margin-top: 3rem;
        }
        footer p { font-size: 0.75rem; letter-spacing: 0.8px; line-height: 1.8; }

        @media (max-width: 600px) {
            .cart-item {
                grid-template-columns: 80px 1fr;
                grid-template-areas: "image details" "image actions";
                gap: 0.8rem;
            }
            .cart-item-image { grid-area: image; width: 80px; height: 106px; }
            .cart-item-details { grid-area: details; }
            .cart-item-quantity { grid-area: actions; justify-self: start; }
            .cart-item-remove { grid-area: actions; justify-self: end; }
            .summary-row { font-size: 0.95rem; }
        }
        a:focus, button:focus { outline: 2px solid var(--medium-brown); outline-offset: 2px; }
    </style>
</head>
<body>

<div class="announcement-bar">
    Free shipping for UK | International shipping please <a href="https://www.instagram.com/satr.labell/" target="_blank" rel="noopener">message @satr.labell</a>
</div>

<header>
    <h1>Satr</h1>
    <nav>
        <a href="satrindex.html">Home</a>
        <a href="productsatr.html">Products</a>
        <a href="aboutme.html">About</a>
        <a href="cart.html" style="background: rgba(74, 51, 38, 0.1);">Cart</a>
    </nav>
</header>

<main class="cart-container">
    <div class="cart-header"><h2>Your Basket</h2></div>
    <div id="cartContent"></div>
</main>

<footer>
    <p>&copy; 2026 Satr.<br>Handcrafted with love for the modern Muslimah.</p>
</footer>

<script>
    function renderCart() {
        const cart = JSON.parse(localStorage.getItem('satrCart')) || [];
        const container = document.getElementById('cartContent');
        
        if (cart.length === 0) {
            container.innerHTML = `
                <div class="cart-empty">
                    <p style="font-size: 3rem; margin: 0;">🛒</p>
                    <p>Your basket is empty</p>
                    <a href="productsatr.html">Continue Shopping</a>
                </div>
            `;
            return;
        }
        
        const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const shipping = subtotal >= 100 ? 0 : 4.99;
        const total = subtotal + shipping;
        
        let itemsHTML = '<div class="cart-items">';
        cart.forEach(item => {
            itemsHTML += `
                <div class="cart-item" data-id="${item.id}">
                    <div class="cart-item-image">
                        <img src="${item.image}" alt="${item.name}" onerror="this.parentElement.innerHTML='<div style=\\'width:100%;height:100%;background:#f0ebe6;display:flex;align-items:center;justify-content:center;color:#8c7b6b;font-size:0.7rem\\'>No Image</div>'">
                    </div>
                    <div class="cart-item-details">
                        <h3>${item.name}</h3>
                        <div class="cart-item-price">£${item.price.toFixed(2)}</div>
                    </div>
                    <div style="display: flex; flex-direction: column; align-items: end; gap: 0.5rem;">
                        <div class="cart-item-quantity">
                            <button class="qty-btn" onclick="updateQty('${item.id}', -1)">−</button>
                            <span class="qty-value">${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQty('${item.id}', 1)">+</button>
                        </div>
                        <button class="cart-item-remove" onclick="removeItem('${item.id}')" aria-label="Remove ${item.name}">×</button>
                    </div>
                </div>
            `;
        });
        itemsHTML += '</div>';
        
        const summaryHTML = `
            <div class="cart-summary">
                <div class="summary-row"><span>Subtotal</span><span>£${subtotal.toFixed(2)}</span></div>
                <div class="summary-row"><span>Shipping</span><span>${shipping === 0 ? 'FREE' : '£' + shipping.toFixed(2)}</span></div>
                <div class="summary-row"><span class="summary-total">Total</span><span class="summary-total">£${total.toFixed(2)}</span></div>
                <a href="#" class="checkout-btn" id="checkoutBtn">Proceed to Checkout</a>
                <button class="clear-cart" onclick="clearCart()">Clear Basket</button>
            </div>
        `;
        
        container.innerHTML = itemsHTML + summaryHTML;
        
        document.getElementById('checkoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            alert('✨ Checkout functionality coming soon!\n\nFor now, please message @satr.labell on Instagram to complete your order.');
        });
    }
    
    window.updateQty = function(id, change) {
        let cart = JSON.parse(localStorage.getItem('satrCart')) || [];
        const item = cart.find(i => i.id === id);
        if (item) {
            item.quantity = Math.max(1, item.quantity + change);
            localStorage.setItem('satrCart', JSON.stringify(cart));
            renderCart();
        }
    };
    
    window.removeItem = function(id) {
        let cart = JSON.parse(localStorage.getItem('satrCart')) || [];
        cart = cart.filter(item => item.id !== id);
        localStorage.setItem('satrCart', JSON.stringify(cart));
        renderCart();
    };
    
    window.clearCart = function() {
        if (confirm('Clear your entire basket?')) {
            localStorage.removeItem('satrCart');
            renderCart();
        }
    };
    
    document.addEventListener('DOMContentLoaded', renderCart);
    
    // Debug background
    const bgTest = new Image();
    bgTest.src = './background.jpeg';
    bgTest.onload = () => console.log('✅ background.jpeg loaded');
    bgTest.onerror = () => console.error('❌ background.jpeg failed - check filename & location');
</script>
</body>
</html>
