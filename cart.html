<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Satr</title>
    <style>
        html { background-color: #4a3326; min-height: 100%; }
        body {
            background: linear-gradient(to bottom, #4a3326 0%, #4a3326 40%, #ffffff 100%);
            margin: 0; min-height: 100vh;
        }
        body:not(.fonts-loaded) * { opacity: 0; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500&family=Playfair+Display+SC:wght@400;700;900&display=swap"
          rel="stylesheet" onload="document.body.classList.add('fonts-loaded')">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --dark-brown: #4a3326;
            --medium-brown: #7a6855;
            --light-brown: #a89a89;
            --off-white: #f9f7f5;
            --white: #ffffff;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            --animation-timing: cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            color: var(--dark-brown);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem;
        }

        /* ── Header ── */
        header {
            text-align: center;
            margin-bottom: 3rem;
            width: 100%;
            max-width: 900px;
            padding-top: 1rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1.2s var(--animation-timing) 0.3s forwards;
        }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        h1 {
            font-family: 'Playfair Display SC', serif;
            font-size: 4.8rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            color: var(--white);
            text-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }

        nav {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.35);
        }

        nav a {
            text-decoration: none;
            color: var(--white);
            font-weight: 500;
            font-size: 1rem;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            padding: 0.6rem 0.4rem;
            transition: var(--transition);
            position: relative;
        }

        nav a.active::after, nav a:hover::after {
            content: "";
            position: absolute;
            bottom: -5px; left: 50%;
            transform: translateX(-50%);
            width: 60%; height: 1.5px;
            background-color: var(--white);
        }

        /* Cart badge */
        .cart-link { position: relative; }
        #cart-badge {
            display: none;
            position: absolute;
            top: -4px; right: -14px;
            background: var(--white);
            color: var(--dark-brown);
            font-size: 0.6rem;
            font-weight: 700;
            width: 16px; height: 16px;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
        }

        /* ── Cart Layout ── */
        .cart-container {
            width: 100%;
            max-width: 900px;
            margin-bottom: 5rem;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s var(--animation-timing) 0.6s forwards;
        }

        .cart-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            color: var(--dark-brown);
            margin-bottom: 2rem;
            text-align: center;
        }

        /* ── Empty state ── */
        .cart-empty {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--white);
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .cart-empty p {
            font-size: 1.1rem;
            color: var(--medium-brown);
            margin-bottom: 2rem;
        }

        .cart-empty a {
            display: inline-block;
            background: var(--dark-brown);
            color: var(--white);
            text-decoration: none;
            padding: 1rem 2.5rem;
            text-transform: uppercase;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            border-radius: 4px;
            transition: var(--transition);
        }

        .cart-empty a:hover { background: var(--medium-brown); }

        /* ── Cart items ── */
        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .cart-item {
            background: var(--white);
            border-radius: 12px;
            padding: 1.5rem;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 1.5rem;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: var(--transition);
        }

        .cart-item:hover { box-shadow: 0 8px 25px rgba(0,0,0,0.12); }

        .item-info h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            color: var(--dark-brown);
            margin-bottom: 0.3rem;
        }

        .item-info .item-size {
            font-size: 0.8rem;
            color: var(--light-brown);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .item-info .item-price {
            font-size: 1rem;
            color: var(--medium-brown);
            margin-top: 0.4rem;
        }

        /* Quantity controls */
        .item-controls {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.8rem;
        }

        .qty-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border: 1px solid var(--light-brown);
            border-radius: 4px;
            overflow: hidden;
        }

        .qty-btn {
            background: none;
            border: none;
            padding: 0.4rem 0.8rem;
            font-size: 1.1rem;
            color: var(--dark-brown);
            cursor: pointer;
            transition: var(--transition);
        }

        .qty-btn:hover { background: var(--off-white); }

        .qty-display {
            font-size: 0.9rem;
            font-weight: 500;
            min-width: 24px;
            text-align: center;
            color: var(--dark-brown);
        }

        .remove-btn {
            background: none;
            border: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--light-brown);
            cursor: pointer;
            transition: var(--transition);
        }

        .remove-btn:hover { color: #c0392b; }

        /* ── Order summary ── */
        .order-summary {
            background: var(--white);
            border-radius: 14px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .summary-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            margin-bottom: 1.5rem;
            color: var(--dark-brown);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--medium-brown);
            margin-bottom: 0.8rem;
        }

        .summary-row.total {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--dark-brown);
            border-top: 1px solid var(--off-white);
            padding-top: 1rem;
            margin-top: 0.5rem;
        }

        .checkout-btn {
            display: block;
            width: 100%;
            margin-top: 1.5rem;
            background: var(--dark-brown);
            color: var(--white);
            border: none;
            padding: 1.2rem;
            text-transform: uppercase;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2px;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
        }

        .checkout-btn:hover { background: var(--medium-brown); letter-spacing: 3px; }
        .checkout-btn:disabled { opacity: 0.5; cursor: not-allowed; letter-spacing: 2px; }

        .checkout-note {
            margin-top: 1rem;
            font-size: 0.75rem;
            color: var(--light-brown);
            text-align: center;
        }

        footer {
            margin-top: 4rem;
            padding: 2rem;
            border-top: 1px solid var(--light-brown);
            color: var(--dark-brown);
            font-size: 0.9rem;
            opacity: 0.8;
            width: 100%;
            text-align: center;
        }

        @media (max-width: 600px) {
            h1 { font-size: 3.5rem; }
            .cart-item { grid-template-columns: 1fr; gap: 1rem; }
            .item-controls { align-items: flex-start; }
        }
    </style>
</head>
<body>

<header>
    <h1>Satr</h1>
    <nav>
        <a href="satrindex.html">Home</a>
        <a href="productsatr.html">Products</a>
        <a href="aboutme.html">About</a>
        <a href="moodboard.html">Moods</a>
        <a href="cart.html" class="active cart-link">
            Cart <span id="cart-badge"></span>
        </a>
    </nav>
</header>

<main class="cart-container">
    <h2 class="cart-title">Your Cart</h2>
    <div id="cart-content">
        <!-- Rendered by JS -->
    </div>
</main>

<footer>
    <p>&copy; 2026 Satr. Handcrafted with love.</p>
</footer>

<script src="cart.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        document.body.classList.add('fonts-loaded');
        renderCart();
    });

    window.addEventListener('satr:cart-updated', renderCart);

    function renderCart() {
        const summary = SatrCart.getSummary();
        const container = document.getElementById('cart-content');

        if (summary.items.length === 0) {
            container.innerHTML = `
                <div class="cart-empty">
                    <p>Your cart is empty.</p>
                    <a href="productsatr.html">Shop the Collection</a>
                </div>`;
            return;
        }

        const itemsHTML = summary.items.map(item => `
            <div class="cart-item">
                <div class="item-info">
                    <h3>${item.name}</h3>
                    <div class="item-size">Size: ${item.size}</div>
                    <div class="item-price">£${(item.price / 100).toFixed(2)} each</div>
                </div>
                <div class="item-controls">
                    <div class="qty-row">
                        <button class="qty-btn" onclick="changeQty('${item.productId}', '${item.size}', ${item.quantity - 1})">−</button>
                        <span class="qty-display">${item.quantity}</span>
                        <button class="qty-btn" onclick="changeQty('${item.productId}', '${item.size}', ${item.quantity + 1})">+</button>
                    </div>
                    <button class="remove-btn" onclick="SatrCart.removeItem('${item.productId}', '${item.size}')">Remove</button>
                </div>
                <div style="text-align:right; font-weight:500; color:var(--dark-brown); font-size:1rem;">
                    £${((item.price * item.quantity) / 100).toFixed(2)}
                </div>
            </div>
        `).join('');

        container.innerHTML = `
            <div class="cart-items">${itemsHTML}</div>
            <div class="order-summary">
                <div class="summary-title">Order Summary</div>
                <div class="summary-row">
                    <span>${summary.itemCount} item${summary.itemCount !== 1 ? 's' : ''}</span>
                    <span>${summary.subtotalFormatted}</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span>Calculated at checkout</span>
                </div>
                <div class="summary-row total">
                    <span>Total</span>
                    <span>${summary.subtotalFormatted}</span>
                </div>
                <button class="checkout-btn" id="checkout-btn" onclick="startCheckout()">
                    Proceed to Checkout
                </button>
                <p class="checkout-note">Secure payment via Stripe</p>
            </div>`;
    }

    function changeQty(productId, size, newQty) {
        SatrCart.updateQuantity(productId, size, newQty);
    }

    async function startCheckout() {
        const btn = document.getElementById('checkout-btn');
        btn.disabled = true;
        btn.textContent = 'Redirecting...';

        const { items } = SatrCart.getSummary();

        try {
            // Call your Netlify/Vercel function
            const response = await fetch('/api/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Checkout failed');
            }

            // Redirect to Stripe Checkout
            window.location.href = data.url;

        } catch (err) {
            console.error('[Checkout Error]', err);
            btn.disabled = false;
            btn.textContent = 'Proceed to Checkout';
            alert('Something went wrong. Please try again.');
        }
    }
</script>
</body>
</html>
