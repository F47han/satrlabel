<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basket | Satr</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;600;700&family=Playfair+Display+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--dark-brown:#4a3326;--medium-brown:#7a6855;--light-brown:#a89a89;--off-white:#f9f7f5;--white:#ffffff;--transition:all 0.35s ease}
        html{background-color:var(--dark-brown);min-height:100%}
        body{background:linear-gradient(to bottom,#4a3326 0%,#4f382d 30%,#4a3326 55%,#f1ede6 80%,#ffffff 100%);min-height:100vh;font-family:'Montserrat',sans-serif;color:var(--dark-brown);display:flex;flex-direction:column;align-items:center;padding:0 1.5rem 3rem;overflow-x:hidden}
        header{text-align:center;width:100%;max-width:960px;padding:1.5rem 0 0;position:relative}
        .site-logo{font-family:'Playfair Display SC',serif;font-size:clamp(2.6rem,8vw,4.8rem);font-weight:400;letter-spacing:0.1em;color:var(--white);text-shadow:0 2px 6px rgba(0,0,0,0.25);text-decoration:none;display:inline-block}
        .menu-toggle{display:none;background:none;border:2px solid rgba(255,255,255,0.7);color:var(--white);font-size:1.3rem;cursor:pointer;position:absolute;top:1.8rem;right:0;z-index:200;border-radius:6px;width:42px;height:42px;align-items:center;justify-content:center}
        nav{margin-top:1.3rem;display:flex;justify-content:center;gap:1.5rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,0.35);flex-wrap:wrap}
        nav a{text-decoration:none;color:var(--white);font-weight:600;font-size:0.72rem;letter-spacing:1.5px;text-transform:uppercase;padding:6px 4px;position:relative;transition:var(--transition);display:inline-flex;align-items:center;gap:5px;min-height:44px}
        nav a::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%) scaleX(0);width:70%;height:1.5px;background:var(--white);transition:var(--transition);transform-origin:center}
        nav a:hover::after,nav a.active::after{transform:translateX(-50%) scaleX(1)}
        .cart-count-badge{display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.25);color:var(--white);font-size:0.6rem;font-weight:700;min-width:18px;height:18px;border-radius:9px;padding:0 4px;line-height:1;border:1px solid rgba(255,255,255,0.5)}
        .cart-count-badge.has-items{background:var(--white);color:var(--dark-brown)}
        @media(max-width:640px){
            .menu-toggle{display:inline-flex}
            nav{display:none;flex-direction:column;position:absolute;top:100%;left:-1.5rem;right:-1.5rem;background:rgba(74,51,38,0.97);backdrop-filter:blur(12px);z-index:100;padding:0.5rem 1.5rem 1rem;gap:0;border-top:1px solid rgba(255,255,255,0.2)}
            nav.open{display:flex}
            nav a{width:100%;padding:13px 0;border-bottom:1px solid rgba(255,255,255,0.1);font-size:0.8rem}
            nav a:last-child{border-bottom:none}
            nav a::after{display:none}
        }

        /* Cart page */
        .cart-wrapper{width:100%;max-width:820px;padding-top:3rem}
        .cart-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,4vw,2.4rem);color:var(--white);text-align:center;margin-bottom:2.5rem;letter-spacing:0.05em;text-shadow:0 2px 6px rgba(0,0,0,0.2)}

        /* Empty */
        .cart-empty{background:rgba(255,255,255,0.92);border-radius:18px;padding:4rem 2rem;text-align:center;box-shadow:0 15px 40px rgba(0,0,0,0.12)}
        .cart-empty p{font-size:1rem;color:var(--medium-brown);margin-bottom:2rem;letter-spacing:0.5px}
        .cart-empty a{display:inline-block;background:var(--dark-brown);color:var(--white);text-decoration:none;padding:1rem 2.5rem;text-transform:uppercase;font-size:0.78rem;font-weight:700;letter-spacing:2px;border-radius:6px;transition:var(--transition)}
        .cart-empty a:hover{background:var(--medium-brown)}

        /* Items */
        .cart-items{display:flex;flex-direction:column;gap:1rem;margin-bottom:1.5rem}
        .cart-item{background:rgba(255,255,255,0.93);border-radius:14px;padding:1.4rem 1.6rem;display:grid;grid-template-columns:1fr auto auto;gap:1.2rem;align-items:center;box-shadow:0 6px 20px rgba(0,0,0,0.1);transition:var(--transition)}
        .cart-item:hover{box-shadow:0 10px 28px rgba(0,0,0,0.15);transform:translateY(-1px)}
        .item-info h3{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--dark-brown);margin-bottom:0.25rem}
        .item-size{font-size:0.72rem;color:var(--light-brown);text-transform:uppercase;letter-spacing:1px}
        .item-unit-price{font-size:0.82rem;color:var(--medium-brown);margin-top:0.25rem}
        .qty-row{display:flex;align-items:center;border:1px solid var(--light-brown);border-radius:6px;overflow:hidden}
        .qty-btn{background:none;border:none;padding:0.5rem 0.75rem;font-size:1.1rem;color:var(--dark-brown);cursor:pointer;transition:var(--transition)}
        .qty-btn:hover{background:var(--off-white)}
        .qty-display{font-size:0.9rem;font-weight:600;min-width:28px;text-align:center;color:var(--dark-brown);padding:0 4px}
        .item-right{display:flex;flex-direction:column;align-items:flex-end;gap:0.6rem}
        .item-total{font-size:1rem;font-weight:600;color:var(--dark-brown)}
        .remove-btn{background:none;border:none;font-size:0.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--light-brown);cursor:pointer;transition:var(--transition)}
        .remove-btn:hover{color:#c0392b}

        @media(max-width:520px){
            .cart-item{grid-template-columns:1fr auto;grid-template-rows:auto auto;padding:1rem}
            .item-info{grid-column:1;grid-row:1}
            .qty-row{grid-column:1;grid-row:2;width:fit-content}
            .item-right{grid-column:2;grid-row:1/3}
        }

        /* Summary */
        .order-summary{background:rgba(255,255,255,0.95);border-radius:16px;padding:2rem;box-shadow:0 12px 36px rgba(0,0,0,0.12)}
        .summary-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--dark-brown);margin-bottom:1.4rem;font-weight:600}
        .summary-row{display:flex;justify-content:space-between;align-items:center;padding:0.7rem 0;border-bottom:1px solid rgba(74,51,38,0.08);font-size:0.9rem;color:var(--dark-brown)}
        .summary-row:last-of-type{border-bottom:none}
        .summary-row.total{font-weight:700;font-size:1.05rem;padding-top:1rem;border-top:2px solid rgba(74,51,38,0.2);border-bottom:none;margin-top:0.5rem}
        .checkout-btn{width:100%;margin-top:1.5rem;padding:1.1rem;background:var(--dark-brown);color:var(--white);border:none;border-radius:8px;font-family:'Montserrat',sans-serif;font-size:0.82rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;cursor:pointer;transition:var(--transition);min-height:52px}
        .checkout-btn:hover:not(:disabled){background:var(--medium-brown);transform:translateY(-2px)}
        .checkout-btn:disabled{opacity:0.6;cursor:not-allowed}
        .checkout-note{font-size:0.7rem;text-align:center;color:var(--light-brown);margin-top:0.8rem;letter-spacing:0.5px}

        footer{width:100%;max-width:820px;text-align:center;padding:2rem 1rem;border-top:1px solid rgba(74,51,38,0.15);color:var(--dark-brown);margin-top:1.5rem}
        footer p{font-size:0.78rem;letter-spacing:0.5px}
        a:focus,button:focus{outline:2px solid rgba(74,51,38,0.5);outline-offset:2px}
    </style>
</head>
<body>
    <header>
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu" aria-expanded="false">&#9776;</button>
        <a href="index.html" class="site-logo">Satr</a>
        <nav id="mainNav">
            <a href="index.html">Home</a>
            <a href="productsatr.html">Products</a>
            <a href="aboutme.html">About</a>
            <a href="cart.html" class="active">Cart <span class="cart-count-badge" id="cartBadge"></span></a>
        </nav>
    </header>

    <div class="cart-wrapper">
        <h2 class="cart-title">Your Basket</h2>
        <div id="cart-content"></div>
    </div>

    <footer>
        <p>&copy; 2026 Satr. Handcrafted with love for the modern Muslimah.</p>
    </footer>

    <script src="satr-cart.js"></script>
    <script>
        // Mobile menu
        const toggle = document.getElementById('menuToggle');
        const nav    = document.getElementById('mainNav');
        toggle.addEventListener('click', () => {
            const open = nav.classList.toggle('open');
            toggle.textContent = open ? '\u2715' : '\u2630';
            toggle.setAttribute('aria-expanded', open);
        });
        nav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
            nav.classList.remove('open'); toggle.textContent = '\u2630';
        }));
        document.addEventListener('click', e => {
            if (!nav.contains(e.target) && !toggle.contains(e.target)) {
                nav.classList.remove('open'); toggle.textContent = '\u2630';
            }
        });

        function updateBadge() {
            const b = document.getElementById('cartBadge');
            if (!b) return;
            const c = SatrCart.getSummary().itemCount;
            b.textContent = c > 0 ? c : '';
            b.classList.toggle('has-items', c > 0);
        }

        function changeQty(productId, size, newQty) {
            SatrCart.updateQuantity(productId, size, newQty);
        }

        function renderCart() {
            const summary   = SatrCart.getSummary();
            const container = document.getElementById('cart-content');
            updateBadge();

            if (summary.items.length === 0) {
                container.innerHTML = `
                    <div class="cart-empty">
                        <p>Your basket is empty.</p>
                        <a href="productsatr.html">Shop the Collection</a>
                    </div>`;
                return;
            }

            const itemsHTML = summary.items.map(item => `
                <div class="cart-item">
                    <div class="item-info">
                        <h3>${item.name}</h3>
                        <div class="item-size">Size: ${item.size}</div>
                        <div class="item-unit-price">&pound;${(item.price / 100).toFixed(2)} each</div>
                    </div>
                    <div class="qty-row">
                        <button class="qty-btn" onclick="changeQty('${item.productId}','${item.size}',${item.quantity - 1})">&#8722;</button>
                        <span class="qty-display">${item.quantity}</span>
                        <button class="qty-btn" onclick="changeQty('${item.productId}','${item.size}',${item.quantity + 1})">+</button>
                    </div>
                    <div class="item-right">
                        <span class="item-total">&pound;${((item.price * item.quantity) / 100).toFixed(2)}</span>
                        <button class="remove-btn" onclick="SatrCart.removeItem('${item.productId}','${item.size}')">Remove</button>
                    </div>
                </div>
            `).join('');

            container.innerHTML = `
                <div class="cart-items">${itemsHTML}</div>
                <div class="order-summary">
                    <div class="summary-title">Order Summary</div>
                    <div class="summary-row">
                        <span>${summary.itemCount} item${summary.itemCount !== 1 ? 's' : ''}</span>
                        <span>${summary.subtotalFormatted}</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span>Free (UK) / Calculated at checkout</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span>${summary.subtotalFormatted}</span>
                    </div>
                    <button class="checkout-btn" id="checkout-btn" onclick="startCheckout()">Proceed to Checkout</button>
                    <p class="checkout-note">Secure payment &middot; UK free delivery</p>
                </div>`;
        }

        async function startCheckout() {
            const btn = document.getElementById('checkout-btn');
            btn.disabled = true;
            btn.textContent = 'Redirecting\u2026';
            const { items } = SatrCart.getSummary();
            try {
                const res  = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Checkout failed');
                window.location.href = data.url;
            } catch (err) {
                console.error('[Checkout]', err);
                btn.disabled = false;
                btn.textContent = 'Proceed to Checkout';
                alert('Something went wrong. Please try again.');
            }
        }

        renderCart();
        window.addEventListener('satr:cart-updated', renderCart);
    </script>
</body>
</html>
