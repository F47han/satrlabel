<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Satr</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;600;700&family=Playfair+Display+SC:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-brown: #4a3326;
            --medium-brown: #7a6855;
            --light-brown: #a89a89;
            --off-white: #f9f7f5;
            --white: #ffffff;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            --anim: cubic-bezier(0.16, 1, 0.3, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            color: var(--white);
            background-color: #2a1d15;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 4rem;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('background.jpeg');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* Dark overlay so white card text reads well */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 10, 4, 0.45);
            z-index: -1;
        }

        .announcement-bar {
            width: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 12px 10px;
            text-align: center;
            font-size: 0.65rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            position: sticky;
            top: 0;
            z-index: 3000;
        }
        .announcement-bar a { color: var(--white); text-decoration: underline; font-weight: 700; }

        header {
            text-align: center;
            padding: 2.5rem 1rem 1.5rem;
            width: 100%;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1.2s var(--anim) 0.2s forwards;
        }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        h1 {
            font-family: 'Playfair Display SC', serif;
            font-size: clamp(2.2rem, 8vw, 4rem);
            letter-spacing: 0.3em;
            font-weight: 300;
            text-transform: uppercase;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        nav a {
            text-decoration: none;
            color: var(--white);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            font-weight: 700;
            padding-bottom: 4px;
            position: relative;
            transition: var(--transition);
        }

        nav a.active::after, nav a:hover::after {
            content: "";
            position: absolute;
            bottom: -4px; left: 50%;
            transform: translateX(-50%);
            width: 60%; height: 1.5px;
            background: var(--white);
        }

        /* Cart container */
        .cart-container {
            width: 100%;
            max-width: 820px;
            padding: 0 1.5rem;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 1.2s var(--anim) 0.5s forwards;
        }

        .cart-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 400;
            color: var(--white);
            text-align: center;
            margin-bottom: 2rem;
            letter-spacing: 0.05em;
        }

        /* Empty state */
        .cart-empty {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(30,18,10,0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
        }

        .cart-empty p {
            font-size: 1rem;
            color: rgba(255,255,255,0.65);
            margin-bottom: 2rem;
        }

        .cart-empty a {
            display: inline-block;
            background: rgba(255,255,255,0.12);
            color: var(--white);
            text-decoration: none;
            padding: 1rem 2.5rem;
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.25);
            transition: var(--transition);
        }

        .cart-empty a:hover { background: rgba(255,255,255,0.22); letter-spacing: 3px; }

        /* Cart items */
        .cart-items { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }

        .cart-item {
            background: rgba(255,255,255,0.97);
            border-radius: 12px;
            padding: 1.4rem 1.6rem;
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 1.2rem;
            align-items: center;
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        }

        .item-info h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            color: var(--dark-brown);
            margin-bottom: 0.2rem;
        }

        .item-info .item-size {
            font-size: 0.75rem;
            color: var(--light-brown);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .item-info .item-price {
            font-size: 0.9rem;
            color: var(--medium-brown);
            margin-top: 0.3rem;
        }

        .item-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
        }

        .qty-row {
            display: flex;
            align-items: center;
            border: 1px solid var(--light-brown);
            border-radius: 4px;
            overflow: hidden;
        }

        .qty-btn {
            background: none;
            border: none;
            padding: 0.35rem 0.75rem;
            font-size: 1.1rem;
            color: var(--dark-brown);
            cursor: pointer;
            transition: background 0.2s;
        }
        .qty-btn:hover { background: var(--off-white); }

        .qty-display {
            font-size: 0.9rem;
            font-weight: 600;
            min-width: 24px;
            text-align: center;
            color: var(--dark-brown);
        }

        .remove-btn {
            background: none;
            border: none;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--light-brown);
            cursor: pointer;
            transition: color 0.2s;
        }
        .remove-btn:hover { color: #c0392b; }

        .item-total {
            font-weight: 600;
            color: var(--dark-brown);
            font-size: 1rem;
            white-space: nowrap;
        }

        /* Order summary */
        .order-summary {
            background: rgba(30,18,10,0.88);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 2rem;
        }

        .summary-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--white);
            margin-bottom: 1.4rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.88rem;
            color: rgba(255,255,255,0.65);
            margin-bottom: 0.75rem;
        }

        .summary-row.free-shipping span:last-child {
            color: #a8d8a8;
            font-weight: 600;
        }

        .summary-row.total {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--white);
            border-top: 1px solid rgba(255,255,255,0.15);
            padding-top: 1rem;
            margin-top: 0.5rem;
        }

        .checkout-btn {
            display: block;
            width: 100%;
            margin-top: 1.5rem;
            background: rgba(255,255,255,0.12);
            color: var(--white);
            border: 1px solid rgba(255,255,255,0.25);
            padding: 1.2rem;
            text-transform: uppercase;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2.5px;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
        }

        .checkout-btn:hover { background: rgba(255,255,255,0.22); letter-spacing: 3px; }
        .checkout-btn:disabled { opacity: 0.4; cursor: not-allowed; letter-spacing: 2.5px; }

        .checkout-note {
            margin-top: 0.8rem;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            text-align: center;
            letter-spacing: 1px;
        }

        footer {
            text-align: center;
            padding: 4rem 1rem 2rem;
            width: 100%;
        }
        footer p { font-size: 0.75rem; letter-spacing: 1px; line-height: 1.8; color: rgba(255,255,255,0.5); }

        @media (max-width: 520px) {
            .cart-item { grid-template-columns: 1fr; gap: 0.8rem; }
            .item-controls { align-items: flex-start; flex-direction: row; gap: 1rem; }
        }
    </style>
</head>
<body>

<div class="announcement-bar">
    Free shipping for UK | International shipping please <a href="https://www.instagram.com/satr.labell/" target="_blank">message satr.labell</a>
</div>

<header>
    <h1>Satr</h1>
    <nav>
        <a href="satrindex.html">Home</a>
        <a href="productsatr.html">Products</a>
        <a href="aboutme.html">About</a>
        <a href="moodboard.html">Moods</a>
        <a href="cart.html" class="active">Cart</a>
    </nav>
</header>

<main class="cart-container">
    <h2 class="cart-title">Your Cart</h2>
    <div id="cart-content"></div>
</main>

<footer>
    <p>&copy; 2026 Satr.<br>Handcrafted with love for the modern Muslimah.</p>
</footer>

<script>
    // Simple in-page cart using localStorage
    // Prices are £50 each
    const PRICE = 5000; // pence

    function getCart() {
        try { return JSON.parse(localStorage.getItem('satr_cart') || '[]'); } catch(e) { return []; }
    }

    function saveCart(cart) {
        localStorage.setItem('satr_cart', JSON.stringify(cart));
    }

    function renderCart() {
        const cart = getCart();
        const container = document.getElementById('cart-content');

        if (cart.length === 0) {
            container.innerHTML = `
                <div class="cart-empty">
                    <p>Your cart is empty.</p>
                    <a href="productsatr.html">Shop the Collection</a>
                </div>`;
            return;
        }

        const subtotal = cart.reduce((sum, item) => sum + PRICE * item.quantity, 0);
        const subtotalFormatted = '£' + (subtotal / 100).toFixed(2);

        const itemsHTML = cart.map((item, idx) => `
            <div class="cart-item">
                <div class="item-info">
                    <h3>${item.name}</h3>
                    <div class="item-size">Size: ${item.size}</div>
                    <div class="item-price">£${(PRICE/100).toFixed(2)} each</div>
                </div>
                <div class="item-controls">
                    <div class="qty-row">
                        <button class="qty-btn" onclick="changeQty(${idx}, ${item.quantity - 1})">−</button>
                        <span class="qty-display">${item.quantity}</span>
                        <button class="qty-btn" onclick="changeQty(${idx}, ${item.quantity + 1})">+</button>
                    </div>
                    <button class="remove-btn" onclick="removeItem(${idx})">Remove</button>
                </div>
                <div class="item-total">£${((PRICE * item.quantity)/100).toFixed(2)}</div>
            </div>
        `).join('');

        const totalCount = cart.reduce((s, i) => s + i.quantity, 0);

        container.innerHTML = `
            <div class="cart-items">${itemsHTML}</div>
            <div class="order-summary">
                <div class="summary-title">Order Summary</div>
                <div class="summary-row">
                    <span>${totalCount} item${totalCount !== 1 ? 's' : ''}</span>
                    <span>${subtotalFormatted}</span>
                </div>
                <div class="summary-row free-shipping">
                    <span>Shipping</span>
                    <span>Free</span>
                </div>
                <div class="summary-row total">
                    <span>Total</span>
                    <span>${subtotalFormatted}</span>
                </div>
                <button class="checkout-btn" id="checkout-btn" onclick="startCheckout()">
                    Proceed to Checkout
                </button>
                <p class="checkout-note">Secure payment · Free UK shipping</p>
            </div>`;
    }

    function changeQty(idx, newQty) {
        const cart = getCart();
        if (newQty < 1) { removeItem(idx); return; }
        cart[idx].quantity = newQty;
        saveCart(cart);
        renderCart();
    }

    function removeItem(idx) {
        const cart = getCart();
        cart.splice(idx, 1);
        saveCart(cart);
        renderCart();
    }

    async function startCheckout() {
        const btn = document.getElementById('checkout-btn');
        btn.disabled = true;
        btn.textContent = 'Redirecting...';
        const cart = getCart();
        try {
            const response = await fetch('/api/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items: cart })
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Checkout failed');
            window.location.href = data.url;
        } catch (err) {
            console.error('[Checkout Error]', err);
            btn.disabled = false;
            btn.textContent = 'Proceed to Checkout';
            alert('Something went wrong. Please try again.');
        }
    }

    document.addEventListener('DOMContentLoaded', renderCart);
</script>
</body>
</html>
