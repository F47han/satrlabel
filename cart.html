<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Satr</title>
    <style>
        html { min-height: 100%; }
        body {
            margin: 0; min-height: 100vh;
            background: url('background.jpeg') center center / cover no-repeat fixed;
            font-family: 'Montserrat', sans-serif;
            color: #4a3326;
            display: flex; flex-direction: column; align-items: center;
            padding: 1.5rem; overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background: rgba(74, 51, 38, 0.55);
            z-index: 0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --dark-brown: #4a3326;
            --medium-brown: #7a6855;
            --light-brown: #a89a89;
            --off-white: #f9f7f5;
            --white: #ffffff;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            --animation-timing: cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Everything above the overlay */
        header, main, footer { position: relative; z-index: 1; }

        /* ── Header ── */
        header {
            text-align: center; margin-bottom: 2.5rem;
            width: 100%; max-width: 900px; padding-top: 1rem;
            opacity: 0; transform: translateY(20px);
            animation: fadeInUp 1.2s var(--animation-timing) 0.3s forwards;
        }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn   { to { opacity: 1; } }

        h1 {
            font-family: 'Playfair Display SC', serif;
            font-size: clamp(3rem, 8vw, 4.8rem);
            font-weight: 400; letter-spacing: 0.1em;
            color: var(--white);
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        /* ── Mobile toggle ── */
        .menu-toggle {
            display: none; background: none; border: none;
            color: var(--white); font-size: 1.8rem; cursor: pointer;
            position: absolute; top: 1.2rem; right: 1.2rem;
            z-index: 100; text-shadow: 0 1px 3px rgba(0,0,0,0.4);
            opacity: 0; animation: fadeIn 1s ease-in 0.8s forwards;
        }

        /* ── Nav ── */
        nav {
            margin-top: 1.2rem; display: flex;
            justify-content: center; align-items: center;
            gap: 2rem; padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.35);
        }
        nav a {
            text-decoration: none; color: var(--white);
            font-weight: 500; font-size: 0.9rem;
            letter-spacing: 1px; text-transform: uppercase;
            padding: 0.5rem 0.4rem; position: relative;
            transition: var(--transition);
        }
        nav a::after {
            content: ''; position: absolute;
            bottom: -4px; left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 60%; height: 1.5px;
            background: var(--white); transition: var(--transition);
            transform-origin: center;
        }
        nav a:hover::after, nav a.active::after { transform: translateX(-50%) scaleX(1); }

        /* Cart count pill */
        .cart-link { display: inline-flex !important; align-items: center; gap: 0.5rem; }
        .cart-count {
            display: inline-flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.2); color: var(--white);
            font-size: 0.65rem; font-weight: 700;
            min-width: 18px; height: 18px; padding: 0 4px;
            border-radius: 9px; border: 1px solid rgba(255,255,255,0.4);
            transition: var(--transition); line-height: 1;
        }
        .cart-count.has-items { background: var(--white); color: var(--dark-brown); border-color: var(--white); }

        /* ── Cart container ── */
        .cart-container {
            width: 100%; max-width: 820px;
            opacity: 0; transform: translateY(30px);
            animation: fadeInUp 1s var(--animation-timing) 0.6s forwards;
            margin-bottom: 4rem;
        }

        .cart-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.8rem, 4vw, 2.4rem);
            color: var(--white); text-align: center;
            margin-bottom: 2rem;
            text-shadow: 0 2px 6px rgba(0,0,0,0.3);
            letter-spacing: 0.05em;
        }

        /* ── Empty state ── */
        .cart-empty {
            background: rgba(255,255,255,0.92);
            border-radius: 16px; padding: 4rem 2rem;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }
        .cart-empty p {
            font-size: 1rem; color: var(--medium-brown);
            margin-bottom: 2rem; letter-spacing: 0.5px;
        }
        .cart-empty a {
            display: inline-block; background: var(--dark-brown);
            color: var(--white); text-decoration: none;
            padding: 1rem 2.5rem; text-transform: uppercase;
            font-size: 0.8rem; font-weight: 600; letter-spacing: 2px;
            border-radius: 6px; transition: var(--transition);
        }
        .cart-empty a:hover { background: var(--medium-brown); letter-spacing: 3px; }

        /* ── Cart items ── */
        .cart-items { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }

        .cart-item {
            background: rgba(255,255,255,0.92);
            border-radius: 14px; padding: 1.4rem 1.6rem;
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 1.2rem; align-items: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            backdrop-filter: blur(8px);
            transition: var(--transition);
        }
        .cart-item:hover { box-shadow: 0 12px 32px rgba(0,0,0,0.2); transform: translateY(-1px); }

        .item-info h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem; color: var(--dark-brown); margin-bottom: 0.3rem;
        }
        .item-size {
            font-size: 0.75rem; color: var(--light-brown);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .item-unit-price {
            font-size: 0.85rem; color: var(--medium-brown); margin-top: 0.3rem;
        }

        /* Qty controls */
        .qty-row {
            display: flex; align-items: center;
            border: 1px solid var(--light-brown); border-radius: 6px; overflow: hidden;
        }
        .qty-btn {
            background: none; border: none;
            padding: 0.5rem 0.8rem; font-size: 1.1rem;
            color: var(--dark-brown); cursor: pointer;
            transition: var(--transition);
        }
        .qty-btn:hover { background: var(--off-white); }
        .qty-display {
            font-size: 0.9rem; font-weight: 600;
            min-width: 28px; text-align: center;
            color: var(--dark-brown); padding: 0 4px;
        }

        .item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.6rem; }
        .item-total { font-size: 1rem; font-weight: 600; color: var(--dark-brown); }
        .remove-btn {
            background: none; border: none;
            font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 1px; color: var(--light-brown);
            cursor: pointer; transition: var(--transition);
        }
        .remove-btn:hover { color: #c0392b; }

        /* ── Order summary ── */
        .order-summary {
            background: rgba(255,255,255,0.95);
            border-radius: 16px; padding: 2rem 2rem 2.5rem;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }
        .summary-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem; color: var(--dark-brown);
            margin-bottom: 1.5rem; letter-spacing: 0.03em;
        }
        .summary-row {
            display: flex; justify-content: space-between;
            font-size: 0.9rem; color: var(--medium-brown);
            margin-bottom: 0.8rem;
        }
        .summary-row.total {
            font-size: 1.1rem; font-weight: 600;
            color: var(--dark-brown);
            border-top: 1px solid #ede8e3;
            padding-top: 1rem; margin-top: 0.5rem;
        }
        .checkout-btn {
            display: block; width: 100%; margin-top: 1.5rem;
            background: var(--dark-brown); color: var(--white);
            border: none; padding: 1.2rem;
            text-transform: uppercase; font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem; font-weight: 600; letter-spacing: 2px;
            border-radius: 8px; cursor: pointer; transition: var(--transition);
        }
        .checkout-btn:hover { background: var(--medium-brown); letter-spacing: 3px; }
        .checkout-btn:disabled { opacity: 0.5; cursor: not-allowed; letter-spacing: 2px; }

        .checkout-note {
            margin-top: 1rem; font-size: 0.75rem;
            color: var(--light-brown); text-align: center; letter-spacing: 0.5px;
        }

        /* ── Footer ── */
        footer {
            position: relative; z-index: 1;
            margin-top: 2rem; padding: 2rem;
            text-align: center; width: 100%;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        footer p { font-size: 0.85rem; color: rgba(255,255,255,0.7); letter-spacing: 0.5px; }

        /* ── Mobile ── */
        @media (max-width: 767px) {
            body { padding: 1rem; }
            .menu-toggle { display: block; }
            nav {
                display: none; flex-direction: column;
                gap: 0; padding: 0.5rem 0;
                border-top: 1px solid rgba(255,255,255,0.4);
                background: rgba(74,51,38,0.92);
                border-radius: 12px; margin-top: 1rem;
                backdrop-filter: blur(10px);
            }
            nav.show { display: flex; }
            nav a {
                font-size: 1.05rem; padding: 0.9rem 1.5rem;
                width: 100%; text-align: left;
            }
            nav a::after { display: none; }
            nav a:hover { background: rgba(255,255,255,0.1); }
            nav a + a { border-top: 1px solid rgba(255,255,255,0.1); }
            .cart-link { justify-content: flex-start; }

            .cart-item {
                grid-template-columns: 1fr auto;
                grid-template-rows: auto auto;
            }
            .item-info { grid-column: 1; grid-row: 1; }
            .qty-row   { grid-column: 1; grid-row: 2; width: fit-content; }
            .item-right { grid-column: 2; grid-row: 1 / 3; }

            .order-summary { padding: 1.5rem; }
        }

        @media (max-width: 400px) {
            h1 { font-size: 2.8rem; }
            .cart-item { padding: 1rem; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500&family=Playfair+Display+SC:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <button class="menu-toggle" id="menuToggle">☰</button>
        <h1>Satr</h1>
        <nav id="mainNav">
            <a href="index.html">Home</a>
            <a href="productsatr.html">Products</a>
            <a href="aboutme.html">About</a>
            <a href="cart.html" class="active cart-link">
                Cart <span class="cart-count" id="cart-count">0</span>
            </a>
        </nav>
    </header>

    <main class="cart-container">
        <h2 class="cart-title">Your Cart</h2>
        <div id="cart-content"></div>
    </main>

    <footer>
        <p>&copy; 2026 Satr. Handcrafted with love.</p>
    </footer>

    <script src="cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            renderCart();
            updateCartCount();

            // Mobile menu
            const menuToggle = document.getElementById('menuToggle');
            const nav        = document.getElementById('mainNav');

            menuToggle.addEventListener('click', function() {
                nav.classList.toggle('show');
                menuToggle.textContent = nav.classList.contains('show') ? '✕' : '☰';
            });
            nav.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', function() {
                    if (window.innerWidth <= 767) {
                        nav.classList.remove('show');
                        menuToggle.textContent = '☰';
                    }
                });
            });
            document.addEventListener('click', function(e) {
                if (window.innerWidth <= 767 &&
                    !nav.contains(e.target) &&
                    !menuToggle.contains(e.target) &&
                    nav.classList.contains('show')) {
                    nav.classList.remove('show');
                    menuToggle.textContent = '☰';
                }
            });
            window.addEventListener('resize', function() {
                if (window.innerWidth > 767 && nav.classList.contains('show')) {
                    nav.classList.remove('show');
                    menuToggle.textContent = '☰';
                }
            });
        });

        window.addEventListener('satr:cart-updated', function() {
            renderCart();
            updateCartCount();
        });

        function updateCartCount() {
            const el = document.getElementById('cart-count');
            if (!el) return;
            const { itemCount } = SatrCart.getSummary();
            el.textContent = itemCount;
            el.classList.toggle('has-items', itemCount > 0);
        }

        function renderCart() {
            const summary   = SatrCart.getSummary();
            const container = document.getElementById('cart-content');

            if (summary.items.length === 0) {
                container.innerHTML = `
                    <div class="cart-empty">
                        <p>Your cart is empty.</p>
                        <a href="productsatr.html">Shop the Collection</a>
                    </div>`;
                return;
            }

            const itemsHTML = summary.items.map(item => `
                <div class="cart-item">
                    <div class="item-info">
                        <h3>${item.name}</h3>
                        <div class="item-size">Size: ${item.size}</div>
                        <div class="item-unit-price">£${(item.price / 100).toFixed(2)} each</div>
                    </div>
                    <div class="qty-row">
                        <button class="qty-btn" onclick="changeQty('${item.productId}', '${item.size}', ${item.quantity - 1})">−</button>
                        <span class="qty-display">${item.quantity}</span>
                        <button class="qty-btn" onclick="changeQty('${item.productId}', '${item.size}', ${item.quantity + 1})">+</button>
                    </div>
                    <div class="item-right">
                        <span class="item-total">£${((item.price * item.quantity) / 100).toFixed(2)}</span>
                        <button class="remove-btn" onclick="SatrCart.removeItem('${item.productId}', '${item.size}')">Remove</button>
                    </div>
                </div>
            `).join('');

            container.innerHTML = `
                <div class="cart-items">${itemsHTML}</div>
                <div class="order-summary">
                    <div class="summary-title">Order Summary</div>
                    <div class="summary-row">
                        <span>${summary.itemCount} item${summary.itemCount !== 1 ? 's' : ''}</span>
                        <span>${summary.subtotalFormatted}</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span>Calculated at checkout</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span>${summary.subtotalFormatted}</span>
                    </div>
                    <button class="checkout-btn" id="checkout-btn" onclick="startCheckout()">
                        Proceed to Checkout
                    </button>
                    <p class="checkout-note">Secure payment via Stripe · UK delivery only</p>
                </div>`;
        }

        function changeQty(productId, size, newQty) {
            SatrCart.updateQuantity(productId, size, newQty);
        }

        async function startCheckout() {
            const btn = document.getElementById('checkout-btn');
            btn.disabled = true;
            btn.textContent = 'Redirecting...';

            const { items } = SatrCart.getSummary();

            try {
                const response = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Checkout failed');
                window.location.href = data.url;
            } catch (err) {
                console.error('[Checkout Error]', err);
                btn.disabled = false;
                btn.textContent = 'Proceed to Checkout';
                alert('Something went wrong. Please try again.');
            }
        }
    </script>
</body>
</html>
