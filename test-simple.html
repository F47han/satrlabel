<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Moodboard</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #4a3326;
            font-family: Arial, sans-serif;
        }
        
        h1 {
            color: white;
            text-align: center;
        }
        
        .test-box {
            width: 80%;
            max-width: 800px;
            height: 500px;
            margin: 20px auto;
            background: white;
            border: 5px solid red;
            border-radius: 10px;
            padding: 20px;
        }
        
        .test-box h2 {
            color: black;
        }
        
        .test-box img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border: 3px solid blue;
        }
    </style>
</head>
<body>
    <h1>TEST PAGE - Do you see this white text?</h1>
    
    <div class="test-box">
        <h2>TEST BOX - Laila</h2>
        <img src="lailamoodboard.JPG" alt="Laila Test">
    </div>
    
    <div class="test-box">
        <h2>TEST BOX - Nila</h2>
        <img src="nilamoodboard.JPG" alt="Nila Test">
    </div>
</body>
</html>
