<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satr | Timeless Abayas</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500&family=Playfair+Display+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-brown: #4a3326;
            --medium-brown: #7a6855;
            --light-brown: #a89a89;
            --white: #ffffff;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Background Image Setup */
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            color: var(--white);
            background: linear-gradient(rgba(74, 51, 38, 0.7), rgba(74, 51, 38, 0.7)), url('background.jpeg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 2rem 1rem;
            width: 100%;
            z-index: 100;
        }

        h1 {
            font-family: 'Playfair Display SC', serif;
            font-size: clamp(2.8rem, 8vw, 4.5rem);
            font-weight: 400;
            letter-spacing: 0.1em;
            color: var(--white);
            margin-bottom: 1rem;
        }

        /* Desktop Nav */
        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            border-top: 1px solid rgba(255,255,255,0.3);
            padding-top: 1rem;
        }

        nav a {
            text-decoration: none;
            color: var(--white);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: var(--transition);
            position: relative;
        }

        /* Hamburger Menu Styles */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            z-index: 1001;
            position: absolute;
            top: 2rem;
            right: 2rem;
        }

        .menu-toggle span {
            width: 30px;
            height: 2px;
            background: var(--white);
            transition: var(--transition);
        }

        /* Hero Slider */
        .hero-slider {
            width: 95%;
            max-width: 1400px;
            height: 80vh;
            margin-bottom: 5rem;
            position: relative;
            overflow: hidden;
            border-radius: 30px;
            box-shadow: 0 35px 90px rgba(0,0,0,0.4);
        }

        .slider-container { width: 100%; height: 100%; position: relative; }
        .slide {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            transition: opacity 1.2s ease;
            background-size: cover;
            background-position: center;
        }
        .slide.active { opacity: 1; }

        .hero-content-box {
            position: absolute;
            bottom: 40px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.95);
            padding: 1.5rem 2.5rem;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .hero-content-box h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            color: var(--dark-brown);
            margin-bottom: 1rem;
        }

        .hero-shop-link {
            display: inline-block;
            text-decoration: none;
            color: var(--white);
            background: var(--dark-brown);
            padding: 0.8rem 1.5rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-radius: 4px;
        }

        /* Product Grid */
        .products-section { width: 100%; max-width: 1200px; padding: 0 1rem; }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 5rem;
        }

        .product-card {
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            text-decoration: none;
            color: var(--dark-brown);
            transition: var(--transition);
        }

        .product-card:hover { transform: translateY(-10px); }
        .product-image { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
        .product-info { padding: 1.5rem; text-align: center; }

        @media (max-width: 768px) {
            .menu-toggle { display: flex; }
            
            nav {
                position: fixed;
                top: 0; right: -100%;
                height: 100vh; width: 70%;
                background: var(--dark-brown);
                flex-direction: column;
                justify-content: center;
                transition: var(--transition);
                z-index: 1000;
                border-top: none;
            }

            nav.active { right: 0; }

            .products-grid { grid-template-columns: 1fr 1fr; gap: 1rem; }
        }
    </style>
</head>
<body>

    <div class="menu-toggle" id="mobile-menu">
        <span></span><span></span><span></span>
    </div>

    <header>
        <h1>Satr</h1>
        <nav id="nav-menu">
            <a href="index.html">Home</a>
            <a href="productsatr.html">Products</a>
            <a href="aboutme.html">About</a>
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
        </nav>
    </header>

    <section class="hero-slider">
        <div class="slider-container" id="hero-slider"></div>
        <div class="hero-content-box">
            <h3 id="hero-abaya-name">Sereen</h3>
            <a href="sereen.html" id="hero-abaya-link" class="hero-shop-link">Shop Piece</a>
        </div>
    </section>

    <main class="products-section">
        <div class="products-grid">
            <a href="sereen.html" class="product-card">
                <img src="sareen4.jpeg" alt="Sereen" class="product-image">
                <div class="product-info"><h2>The Sereen</h2><p>Modern grace in every thread.</p></div>
            </a>
            <a href="flora.html" class="product-card">
                <img src="flora1.jpeg" alt="Flora" class="product-image">
                <div class="product-info"><h2>The Flora</h2><p>Botanical elegance.</p></div>
            </a>
            <a href="noor.html" class="product-card">
                <img src="noor1.jpeg" alt="Noor" class="product-image">
                <div class="product-info"><h2>The Noor</h2><p>Radiant simplicity.</p></div>
            </a>
            <a href="sahara.html" class="product-card">
                <img src="sahara1.jpeg" alt="Sahara" class="product-image">
                <div class="product-info"><h2>The Sahara</h2><p>Warm desert tones.</p></div>
            </a>
        </div>
    </main>

    <script>
        // Hamburger Menu Toggle
        const menuToggle = document.getElementById('mobile-menu');
        const navMenu = document.getElementById('nav-menu');

        menuToggle.addEventListener('click', () => {
            navMenu.classList.toggle('active');
            // Animate hamburger to X
            const spans = menuToggle.querySelectorAll('span');
            spans[0].style.transform = navMenu.classList.contains('active') ? 'rotate(45deg) translate(5px, 6px)' : '';
            spans[1].style.opacity = navMenu.classList.contains('active') ? '0' : '1';
            spans[2].style.transform = navMenu.classList.contains('active') ? 'rotate(-45deg) translate(5px, -6px)' : '';
        });

        // Hero Slider Data
        const heroData = [
            { name: 'Sereen', file: 'sareen3.jpeg', link: 'sereen.html' },
            { name: 'Flora',  file: 'flora1.jpeg',  link: 'flora.html'  },
            { name: 'Nila',   file: 'nila6.jpeg',   link: 'nila.html'   }
        ];

        const sliderContainer = document.getElementById('hero-slider');
        heroData.forEach((item, index) => {
            const slide = document.createElement('div');
            slide.className = 'slide' + (index === 0 ? ' active' : '');
            slide.style.backgroundImage = `url('${item.file}')`;
            sliderContainer.appendChild(slide);
        });

        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
            document.getElementById('hero-abaya-name').textContent = heroData[currentSlide].name;
            document.getElementById('hero-abaya-link').href = heroData[currentSlide].link;
        }, 3000);
    </script>
</body>
</html>
