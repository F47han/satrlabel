<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satr | Timeless Abayas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;600;700&family=Playfair+Display+SC:wght@400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --dark-brown: #4a3326;
            --white: #ffffff;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* High-Quality Background Fix */
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            color: var(--white);
            background-color: #2a1d15;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('background.jpeg');
            background-size: cover;
            background-position: center;
            z-index: -1;
            transform: translateZ(0); /* Sharpness fix */
        }

        .announcement-bar {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 10px 0;
            text-align: center;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: sticky;
            top: 0;
            z-index: 3000;
        }

        header { text-align: center; padding: 2.5rem 1rem 1.5rem; }
        
        /* Thinner Minimalist Logo */
        h1 { 
            font-family: 'Playfair Display SC', serif; 
            font-size: clamp(2.2rem, 8vw, 4rem); 
            letter-spacing: 0.3em; 
            margin: 0; 
            font-weight: 300; 
            text-transform: uppercase;
        }

        /* Consistent Horizontal Navigation */
        nav { 
            display: flex; 
            justify-content: center; 
            gap: 2rem; 
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        nav a { 
            text-decoration: none; 
            color: var(--white); 
            text-transform: uppercase; 
            font-size: 0.8rem; 
            letter-spacing: 2px; 
            font-weight: 700;
            padding-bottom: 4px;
            border-bottom: 1px solid transparent;
            transition: var(--transition);
        }
        nav a:hover { border-bottom: 1px solid var(--white); }

        /* Hero Slider */
        .hero-slider {
            width: 94%;
            max-width: 1400px;
            height: 85vh;
            margin: 2rem auto 5rem;
            position: relative;
            overflow: hidden;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            background-size: cover;
            background-position: center 20%;
        }
        .slide.active { opacity: 1; }

        .hero-content-box {
            position: absolute;
            bottom: 40px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.98);
            padding: 1.5rem 2.5rem;
            border-radius: 10px;
            text-align: center;
            min-width: 260px;
            color: var(--dark-brown);
        }

        .hero-shop-link {
            display: inline-block;
            text-decoration: none;
            color: var(--white);
            background: var(--dark-brown);
            padding: 0.8rem 1.8rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            border-radius: 3px;
        }

        /* STAGGERED GRID FOR DESKTOP | CENTERED FOR MOBILE */
        .products-section { 
            width: 100%; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 1.5rem; 
            box-sizing: border-box;
        }
        
        .products-grid { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            gap: 4rem 2rem; 
            margin-bottom: 8rem;
        }

        .product-card { 
            grid-column: span 12; /* Default for mobile */
            justify-self: center; /* Centers on mobile */
            width: 100%;
            max-width: 350px;
            text-decoration: none; 
            color: var(--dark-brown); 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        /* Desktop Grid Logic (The Staggered Look) */
        @media (min-width: 769px) {
            .product-card { grid-column: span 6; max-width: 450px; }
            /* This creates the staggered "boutique" effect */
            .product-card:nth-child(even) { margin-top: 100px; }
            .product-card:nth-child(odd) { margin-top: 0; }
        }

        .img-container { width: 100%; aspect-ratio: 4/5; overflow: hidden; }
        .product-image { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s ease; }
        
        .product-card:hover { transform: translateY(-10px); }
        .product-card:hover .product-image { transform: scale(1.05); }

        .product-info { padding: 1.5rem; text-align: center; }
        .product-info h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; margin: 0; font-weight: 600; }
        
        .shop-btn-text { 
            display: inline-block; 
            margin-top: 10px; 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-weight: 700;
            color: var(--dark-brown); 
            border-bottom: 2px solid var(--dark-brown);
        }

        footer { text-align: center; padding: 4rem 1rem; background: rgba(0,0,0,0.5); }
        footer p { font-size: 0.8rem; letter-spacing: 1px; line-height: 1.8; }

        /* Animation class */
        .reveal { opacity: 0; transform: translateY(30px); transition: 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* MOBILE SPECIFIC OVERRIDES */
        @media (max-width: 768px) {
            nav { gap: 1rem; }
            nav a { font-size: 0.7rem; letter-spacing: 1px; }
            .hero-slider { height: 70vh; margin-bottom: 3rem; }
            .products-grid { gap: 3rem; }
            .product-card { max-width: 320px; }
        }
    </style>
</head>
<body>

    <div class="announcement-bar">
        Free shipping for UK | Message satr.label
    </div>

    <header>
        <h1>Satr</h1>
        <nav id="nav-menu">
            <a href="index.html">Home</a>
            <a href="productsatr.html">Products</a>
            <a href="aboutme.html">About</a>
            <a href="cart.html">Cart</a>
        </nav>
    </header>

    <section class="hero-slider">
        <div id="hero-slider"></div>
        <div class="hero-content-box">
            <h3 id="hero-abaya-name" style="margin:0 0 10px; font-family:'Cormorant Garamond'; font-size: 1.8rem;">Sereen</h3>
            <a href="sereen.html" id="hero-abaya-link" class="hero-shop-link">Shop Piece</a>
        </div>
    </section>

    <main class="products-section">
        <div class="products-grid">
            <a href="sereen.html" class="product-card reveal">
                <div class="img-container"><img src="sareen4.jpeg" loading="lazy" class="product-image"></div>
                <div class="product-info"><h2>The Sereen</h2><span class="shop-btn-text">Shop Now</span></div>
            </a>
            <a href="flora.html" class="product-card reveal">
                <div class="img-container"><img src="flora1.jpeg" loading="lazy" class="product-image"></div>
                <div class="product-info"><h2>The Flora</h2><span class="shop-btn-text">Shop Now</span></div>
            </a>
            <a href="noor.html" class="product-card reveal">
                <div class="img-container"><img src="noor1.jpeg" loading="lazy" class="product-image"></div>
                <div class="product-info"><h2>The Noor</h2><span class="shop-btn-text">Shop Now</span></div>
            </a>
            <a href="sahara.html" class="product-card reveal">
                <div class="img-container"><img src="sahara1.jpeg" loading="lazy" class="product-image"></div>
                <div class="product-info"><h2>The Sahara</h2><span class="shop-btn-text">Shop Now</span></div>
            </a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Satr. <br> Handcrafted with love for the modern Muslimah.</p>
    </footer>

    <script>
        const heroData = [
            { name: 'Sereen', file: 'sareen3.jpeg', link: 'sereen.html' },
            { name: 'Flora',  file: 'flora1.jpeg',  link: 'flora.html'  },
            { name: 'Nila',   file: 'nila6.jpeg',   link: 'nila.html'   }
        ];

        const sliderContainer = document.getElementById('hero-slider');
        heroData.forEach((item, index) => {
            const slide = document.createElement('div');
            slide.className = 'slide' + (index === 0 ? ' active' : '');
            slide.style.backgroundImage = `url('${item.file}')`;
            sliderContainer.appendChild(slide);
        });

        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
            document.getElementById('hero-abaya-name').textContent = heroData[currentSlide].name;
            document.getElementById('hero-abaya-link').href = heroData[currentSlide].link;
        }, 4000);

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
