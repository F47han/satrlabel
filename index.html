<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satr | Timeless Abayas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;600;700&family=Playfair+Display+SC:wght@400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --dark-brown: #4a3326;
            --cream: #f9f5f0;
            --white: #ffffff;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Fixed Image Quality for Mobile */
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            color: var(--white);
            background-color: #2a1d15;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('background.jpeg');
            background-size: cover;
            background-position: center;
            z-index: -1;
            /* This ensures the image stays sharp on mobile */
            will-change: transform;
        }

        .announcement-bar {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 12px 0;
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: sticky;
            top: 0;
            z-index: 3000;
        }

        header { text-align: center; padding: 3rem 1rem; }
        
        /* Thinner Logo */
        h1 { 
            font-family: 'Playfair Display SC', serif; 
            font-size: clamp(2.5rem, 8vw, 4rem); 
            letter-spacing: 0.3em; 
            margin: 0; 
            font-weight: 300; 
            text-transform: uppercase;
        }

        nav { display: flex; justify-content: center; gap: 2.5rem; margin-top: 1.5rem; }
        nav a { text-decoration: none; color: var(--white); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 2px; font-weight: 700; }

        .menu-toggle { display: none; flex-direction: column; gap: 6px; cursor: pointer; position: absolute; top: 3.5rem; right: 1.5rem; z-index: 4000; }
        .menu-toggle span { width: 30px; height: 1px; background: var(--white); }

        /* Hero */
        .hero-slider {
            width: 94%;
            max-width: 1400px;
            height: 85vh;
            margin: 0 auto 4rem;
            position: relative;
            overflow: hidden;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            background-size: cover;
            background-position: center 20%;
        }
        .slide.active { opacity: 1; }

        .hero-content-box {
            position: absolute;
            bottom: 40px; left: 50%;
            transform: translateX(-50%);
            background: var(--white);
            padding: 1.5rem 2.5rem;
            border-radius: 8px;
            text-align: center;
            color: var(--dark-brown);
        }

        .hero-shop-link {
            display: inline-block;
            text-decoration: none;
            color: var(--white);
            background: var(--dark-brown);
            padding: 0.7rem 1.5rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            border-radius: 2px;
        }

        /* STURDY PRODUCT CARDS */
        .products-section { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
        .products-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 3rem; margin-bottom: 6rem; }

        .product-card { 
            grid-column: span 6; 
            text-decoration: none; 
            color: var(--dark-brown); 
            background: rgba(255, 255, 255, 0.9); /* Strong Contrast */
            border-radius: 15px;
            overflow: hidden;
            transition: var(--transition);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 1024px) {
            .product-card:nth-child(even) { margin-top: 60px; }
        }

        .img-container { width: 100%; aspect-ratio: 4/5; overflow: hidden; }
        .product-image { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        
        .product-card:hover { transform: translateY(-10px); background: #ffffff; }
        .product-card:hover .product-image { transform: scale(1.05); }

        .product-info { padding: 1.5rem; text-align: center; }
        .product-info h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; margin: 0; font-weight: 600; color: var(--dark-brown); }
        .shop-btn-text { 
            display: inline-block; margin-top: 10px; font-size: 0.7rem; 
            text-transform: uppercase; letter-spacing: 2px; font-weight: 700;
            color: var(--dark-brown); border-bottom: 2px solid var(--dark-brown);
        }

        footer { text-align: center; padding: 4rem 1rem; background: rgba(0,0,0,0.4); margin-top: 4rem; }
        footer p { font-size: 0.8rem; letter-spacing: 1px; color: var(--white); }

        /* MOBILE FIXES */
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; letter-spacing: 0.2em; }
            .menu-toggle { display: flex; }
            
            nav {
                position: fixed; top: 0; right: -100%; height: 100vh; width: 85%;
                background: var(--cream); flex-direction: column; justify-content: center; align-items: center;
                transition: 0.4s ease; z-index: 3500;
            }
            nav.active { right: 0; }
            nav a { color: var(--dark-brown); font-size: 1.6rem; font-weight: 800; padding: 1rem; }

            .hero-slider { height: 60vh; width: 92%; border-radius: 20px; }
            
            /* Vertical Mobile List for Clarity */
            .products-grid { display: flex; flex-direction: column; align-items: center; gap: 2.5rem; }
            .product-card { width: 90%; max-width: 350px; }
        }

        .reveal { opacity: 0; transform: translateY(20px); transition: 0.6s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="announcement-bar">
        Free shipping for UK | Message <a href="https://www.instagram.com/satr.labell/?hl=en" style="color:white">satr.label</a>
    </div>

    <div class="menu-toggle" id="mobile-menu">
        <span></span><span></span>
    </div>

    <header>
        <h1>Satr</h1>
        <nav id="nav-menu">
            <a href="index.html">Home</a>
            <a href="productsatr.html">Products</a>
            <a href="aboutme.html">About</a>
            <a href="cart.html">Cart</a>
        </nav>
    </header>

    <section class="hero-slider">
        <div id="hero-slider"></div>
        <div class="hero-content-box">
            <h3 id="hero-abaya-name" style="margin:0 0 10px; font-family:'Cormorant Garamond'; font-size: 1.8rem;">Sereen</h3>
            <a href="sereen.html" id="hero-abaya-link" class="hero-shop-link">Shop Piece</a>
        </div>
    </section>

    <main class="products-section">
        <div class="products-grid">
            <a href="sereen.html" class="product-card reveal">
                <div class="img-container"><img src="sareen4.jpeg" loading="lazy" class="product-image"></div>
                <div class="product-info"><h2>The Sereen</h2><span class="shop-btn-text">Shop Now</span></div>
            </a>
            <a href="flora.html" class="product-card reveal">
                <div class="img-container"><img src="flora1.jpeg" loading="lazy" class="product-image"></div>
                <div class="product-info"><h2>The Flora</h2><span class="shop-btn-text">Shop Now</span></div>
            </a>
            <a href="noor.html" class="product-card reveal">
                <div class="img-container"><img src="noor1.jpeg" loading="lazy" class="product-image"></div>
                <div class="product-info"><h2>The Noor</h2><span class="shop-btn-text">Shop Now</span></div>
            </a>
            <a href="sahara.html" class="product-card reveal">
                <div class="img-container"><img src="sahara1.jpeg" loading="lazy" class="product-image"></div>
                <div class="product-info"><h2>The Sahara</h2><span class="shop-btn-text">Shop Now</span></div>
            </a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Satr. Handcrafted with love for the modern Muslimah.</p>
    </footer>

    <script>
        const heroData = [
            { name: 'Sereen', file: 'sareen3.jpeg', link: 'sereen.html' },
            { name: 'Flora',  file: 'flora1.jpeg',  link: 'flora.html'  },
            { name: 'Nila',   file: 'nila6.jpeg',   link: 'nila.html'   }
        ];

        const sliderContainer = document.getElementById('hero-slider');
        heroData.forEach((item, index) => {
            const slide = document.createElement('div');
            slide.className = 'slide' + (index === 0 ? ' active' : '');
            slide.style.backgroundImage = `url('${item.file}')`;
            sliderContainer.appendChild(slide);
        });

        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
            document.getElementById('hero-abaya-name').textContent = heroData[currentSlide].name;
            document.getElementById('hero-abaya-link').href = heroData[currentSlide].link;
        }, 4000);

        const menuToggle = document.getElementById('mobile-menu');
        const navMenu = document.getElementById('nav-menu');
        menuToggle.addEventListener('click', () => {
            navMenu.classList.toggle('active');
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
