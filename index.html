<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Satr | Timeless Abayas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;600;700&family=Playfair+Display+SC:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-brown: #4a3326;
            --medium-brown: #6b4f3f;
            --light-brown: #8c7b6b;
            --white: #ffffff;
            --cream: #f8f5f2;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            position: relative;
            font-family: 'Montserrat', sans-serif;
            color: var(--dark-brown);
            
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        

        /* ── Announcement Bar ── */
        .announcement-bar {
            width: 100%;
            background: rgba(74, 51, 38, 0.96);
            padding: 10px 15px;
            text-align: center;
            font-size: 0.68rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            position: sticky;
            top: 0;
            z-index: 3000;
            color: var(--white);
        }
        .announcement-bar a {
            color: var(--white);
            text-decoration: underline;
            font-weight: 700;
        }
        .announcement-bar a:hover { opacity: 0.8; }

        /* ── Header ── */
        header {
            text-align: center;
            padding: 1.5rem 1rem 0;
            position: relative;
        }

        .site-logo {
            font-family: 'Playfair Display SC', serif;
            font-size: clamp(2rem, 7vw, 3.5rem);
            letter-spacing: 0.25em;
            font-weight: 400;
            text-transform: uppercase;
            color: var(--dark-brown);
            text-decoration: none;
            display: inline-block;
        }

        /* ── Mobile hamburger ── */
        .menu-toggle {
            display: none;
            background: none;
            border: 2px solid var(--dark-brown);
            color: var(--dark-brown);
            font-size: 1.3rem;
            cursor: pointer;
            position: absolute;
            top: 1.6rem;
            right: 1.2rem;
            z-index: 200;
            border-radius: 6px;
            width: 42px; height: 42px;
            align-items: center;
            justify-content: center;
        }

        /* ── Nav ── */
        nav {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.2rem;
            flex-wrap: wrap;
            padding: 0 10px 1.2rem;
        }

        nav a {
            text-decoration: none;
            color: var(--dark-brown);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            font-weight: 700;
            padding: 8px 14px;
            border-radius: 4px;
            transition: var(--transition);
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        nav a:hover, nav a.active {
            background: rgba(74, 51, 38, 0.1);
        }

        .cart-count-badge {
            display: inline-flex; align-items: center; justify-content: center;
            background: var(--dark-brown); color: var(--white);
            font-size: 0.6rem; font-weight: 700;
            min-width: 18px; height: 18px;
            border-radius: 9px; padding: 0 4px; line-height: 1;
        }
        .cart-count-badge:empty, .cart-count-badge[data-count="0"] { display: none; }

        /* ── Mobile nav styles ── */
        @media (max-width: 600px) {
            .menu-toggle { display: inline-flex; }
            nav {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0; right: 0;
                background: rgba(248, 245, 242, 0.98);
                backdrop-filter: blur(10px);
                border-top: 2px solid var(--dark-brown);
                z-index: 100;
                padding: 0.5rem 1rem 1rem;
                gap: 0;
            }
            nav.open { display: flex; }
            nav a {
                width: 100%;
                padding: 12px 10px;
                border-bottom: 1px solid rgba(74,51,38,0.1);
                font-size: 0.75rem;
            }
            nav a:last-child { border-bottom: none; }
            header { padding-bottom: 0.5rem; }
        }

        /* ── Hero Slider ── */
        .hero-slider {
            width: 92%;
            max-width: 1400px;
            height: 60vh;
            min-height: 300px;
            margin: 1.5rem auto 3rem;
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        @media (min-width: 768px) { .hero-slider { height: 75vh; } }

        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            background-size: cover;
            background-position: center 20%;
        }
        .slide.active { opacity: 1; }

        .hero-content-box {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(248, 245, 242, 0.97);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            text-align: center;
            width: calc(100% - 40px);
            max-width: 400px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }
        .hero-content-box h3 {
            margin: 0 0 12px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--dark-brown);
        }
        .hero-buttons-container {
            display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
        }
        .hero-shop-link {
            display: inline-flex; align-items: center; justify-content: center;
            text-decoration: none;
            color: var(--white);
            background: var(--dark-brown);
            padding: 0.65rem 1.2rem;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            border-radius: 4px;
            transition: var(--transition);
            min-height: 44px;
        }
        .hero-shop-link:hover { background: var(--medium-brown); transform: translateY(-2px); }
        .hero-shop-link.secondary { background: var(--medium-brown); }
        .hero-shop-link.secondary:hover { background: var(--dark-brown); }
        @media (max-width: 480px) {
            .hero-buttons-container { flex-direction: column; }
            .hero-shop-link { width: 100%; }
        }

        /* ── Products Grid ── */
        .products-section {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            margin-bottom: 4rem;
        }
        @media (min-width: 600px) {
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 2.5rem; }
        }
        @media (min-width: 769px) {
            .products-grid {
                grid-template-columns: repeat(12, 1fr);
                gap: 3rem 1.5rem;
                margin-bottom: 6rem;
            }
            .product-card { grid-column: span 6; }
            .product-card:nth-child(even) { margin-top: 60px; }
        }

        .product-card {
            text-decoration: none;
            color: var(--dark-brown);
            display: block;
        }

        .img-container {
            width: 100%;
            aspect-ratio: 3/4;
            overflow: hidden;
            border-radius: 12px;
            background: #e8e1d9;
        }

        .product-image {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .product-card:hover .product-image { transform: scale(1.04); }

        .product-info {
            padding: 1rem 0 0;
            text-align: center;
        }
        .product-info h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            margin: 0 0 8px;
            font-weight: 600;
            color: var(--dark-brown);
        }
        .shop-btn-text {
            display: inline-block;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            color: var(--dark-brown);
            border-bottom: 2px solid var(--dark-brown);
            padding-bottom: 2px;
        }

        /* ── Reveal animation ── */
        .reveal { opacity: 0; transform: translateY(25px); transition: 0.7s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 3rem 1rem;
            background: rgba(74, 51, 38, 0.92);
            color: var(--white);
            margin-top: 2rem;
        }
        footer p { font-size: 0.75rem; letter-spacing: 0.8px; line-height: 1.8; }

        a:focus, button:focus { outline: 2px solid var(--medium-brown); outline-offset: 2px; }
    
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url('background.jpeg') center center / cover no-repeat;
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(74, 51, 38, 0.52);
            z-index: -1;
        }

        </style>
</head>
<body>

    <div class="announcement-bar">
        Free shipping for UK | International shipping please <a href="https://www.instagram.com/satr.labell/" target="_blank" rel="noopener">message @satr.labell</a>
    </div>

    <header>
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu" aria-expanded="false">☰</button>
        <a href="index.html" class="site-logo">Satr</a>
        <nav id="mainNav" role="navigation" aria-label="Main navigation">
            <a href="index.html" class="active">Home</a>
            <a href="productsatr.html">Products</a>
            <a href="aboutme.html">About</a>
            <a href="cart.html">Cart <span class="cart-count-badge" id="cartBadge"></span></a>
        </nav>
    </header>

    <section class="hero-slider" aria-label="Featured abayas">
        <div id="hero-slider"></div>
        <div class="hero-content-box">
            <h3 id="hero-abaya-name">Sereen</h3>
            <div class="hero-buttons-container" id="hero-buttons"></div>
        </div>
    </section>

    <main class="products-section">
        <div class="products-grid">
            <a href="jamila.html" class="product-card reveal" style="background:rgba(15,10,8,0.88);border-radius:12px;overflow:hidden;position:relative;border:1px solid rgba(201,168,76,0.3);">
                <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#c9a84c,#e8d08a,#c9a84c,transparent);z-index:2;"></div>
                <div class="img-container" style="background:#111;">
                    <img src="jamila1.jpeg" alt="The Jamila Limited Edition Abaya" loading="lazy" class="product-image">
                </div>
                <div class="product-info" style="background:rgba(15,10,8,0.88);">
                    <span style="display:inline-block;font-size:0.55rem;font-family:'Montserrat',sans-serif;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(135deg,#c9a84c,#e8d08a);color:#1a1208;padding:3px 10px;border-radius:10px;margin-bottom:6px;">◆ Limited Edition ◆</span>
                    <h2 style="color:#fff;">The Jamila</h2>
                    <span class="shop-btn-text" style="color:#e8d08a;border-bottom-color:#e8d08a;">Shop Now</span>
                </div>
            </a>
            <a href="sereen.html" class="product-card reveal">
                <div class="img-container">
                    <img src="sareen4.jpeg" alt="The Sereen Abaya" loading="lazy" class="product-image">
                </div>
                <div class="product-info">
                    <h2>The Sereen</h2>
                    <span class="shop-btn-text">Shop Now</span>
                </div>
            </a>
            <a href="noor.html" class="product-card reveal">
                <div class="img-container">
                    <img src="noor3.jpeg" alt="The Noor Abaya" loading="lazy" class="product-image">
                </div>
                <div class="product-info">
                    <h2>The Noor</h2>
                    <span class="shop-btn-text">Shop Now</span>
                </div>
            </a>
            <a href="sahara.html" class="product-card reveal">
                <div class="img-container">
                    <img src="sahara1.jpeg" alt="The Sahara Abaya" loading="lazy" class="product-image">
                </div>
                <div class="product-info">
                    <h2>The Sahara</h2>
                    <span class="shop-btn-text">Shop Now</span>
                </div>
            </a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Satr. <br>Handcrafted with love for the modern Muslimah.</p>
    </footer>

    <script src="satr-cart.js"></script>
    <script>
        // ── Mobile menu ──
        const toggle = document.getElementById('menuToggle');
        const nav    = document.getElementById('mainNav');
        toggle.addEventListener('click', () => {
            const open = nav.classList.toggle('open');
            toggle.textContent = open ? '✕' : '☰';
            toggle.setAttribute('aria-expanded', open);
        });
        nav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
            nav.classList.remove('open');
            toggle.textContent = '☰';
            toggle.setAttribute('aria-expanded', false);
        }));
        document.addEventListener('click', e => {
            if (!nav.contains(e.target) && !toggle.contains(e.target)) {
                nav.classList.remove('open');
                toggle.textContent = '☰';
            }
        });

        // ── Cart badge ──
        function updateBadge() {
            const badge = document.getElementById('cartBadge');
            if (!badge) return;
            const count = SatrCart.getSummary().itemCount;
            badge.textContent = count > 0 ? count : '';
        }
        updateBadge();
        window.addEventListener('satr:cart-updated', updateBadge);

        // ── Hero Slider ──
        const heroData = [
            { name: 'Jamila — Limited Edition', file: 'jamila1.jpeg', buttons: [{ text: 'Shop Piece', link: 'jamila.html' }], limited: true },
            { name: 'Sereen', file: 'sareen3.jpeg', buttons: [{ text: 'Shop Piece', link: 'sereen.html' }] },
            { name: 'Nila',   file: 'nila6.jpeg',   buttons: [{ text: 'Shop Piece', link: 'nila.html' }] },
            { name: 'Layla & Sama', file: 'layandsama.jpeg', buttons: [
                { text: 'Shop Layla', link: 'layla.html' },
                { text: 'Shop Sama',  link: 'sama.html' }
            ]}
        ];

        const sliderEl   = document.getElementById('hero-slider');
        const buttonsEl  = document.getElementById('hero-buttons');
        const heroNameEl = document.getElementById('hero-abaya-name');

        heroData.forEach((item, i) => {
            const slide = document.createElement('div');
            slide.className = 'slide' + (i === 0 ? ' active' : '');
            slide.style.backgroundImage = `url('${item.file}')`;
            sliderEl.appendChild(slide);
        });

        function updateButtons(btns, limited) {
            buttonsEl.innerHTML = '';
            btns.forEach((b, i) => {
                const a = document.createElement('a');
                a.href = b.link; a.textContent = b.text;
                if (limited) {
                    a.style.cssText = 'background:linear-gradient(135deg,#1a1208,#2d2010);color:#e8d08a;border:1px solid rgba(201,168,76,0.5);display:inline-flex;align-items:center;justify-content:center;text-decoration:none;padding:0.65rem 1.2rem;font-size:0.65rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;border-radius:4px;min-height:44px;transition:all 0.35s ease;';
                    a.onmouseenter = () => { a.style.background = 'linear-gradient(135deg,#c9a84c,#e8d08a)'; a.style.color = '#1a1208'; };
                    a.onmouseleave = () => { a.style.background = 'linear-gradient(135deg,#1a1208,#2d2010)'; a.style.color = '#e8d08a'; };
                } else {
                    a.className = 'hero-shop-link' + (i > 0 ? ' secondary' : '');
                }
                buttonsEl.appendChild(a);
            });
        }
        function updateHeroName(item) {
            if (item.limited) {
                heroNameEl.innerHTML = `${item.name} <span style="display:inline-block;font-size:0.55rem;font-family:'Montserrat',sans-serif;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(135deg,#c9a84c,#e8d08a);color:#1a1208;padding:3px 10px;border-radius:10px;vertical-align:middle;margin-left:6px;">Limited</span>`;
            } else {
                heroNameEl.textContent = item.name;
            }
        }
        updateButtons(heroData[0].buttons, heroData[0].limited);
        updateHeroName(heroData[0]);

        let current = 0;
        const slides = document.querySelectorAll('.slide');
        function goTo(idx) {
            slides.forEach((s, i) => s.classList.toggle('active', i === idx));
            updateHeroName(heroData[idx]);
            updateButtons(heroData[idx].buttons, heroData[idx].limited);
        }
        setInterval(() => { current = (current + 1) % slides.length; goTo(current); }, 4500);

        // ── Reveal on scroll ──
        const obs = new IntersectionObserver(entries => {
            entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('active'); obs.unobserve(e.target); } });
        }, { threshold: 0.12 });
        document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
    </script>
</body>
</html>
