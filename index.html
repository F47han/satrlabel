<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satr | Timeless Abayas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;600;700&family=Playfair+Display+SC:wght@400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --dark-brown: #4a3326;
            --white: #ffffff;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Mobile-First Background Sharpness */
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            color: var(--white);
            background-color: #2a1d15;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('background.jpeg');
            background-size: cover;
            background-position: center;
            z-index: -1;
            /* Prevents mobile blurriness */
            transform: translateZ(0);
        }

        .announcement-bar {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 10px 0;
            text-align: center;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: sticky;
            top: 0;
            z-index: 3000;
        }

        header { text-align: center; padding: 2.5rem 1rem 1.5rem; }
        
        /* Thinner Logo */
        h1 { 
            font-family: 'Playfair Display SC', serif; 
            font-size: clamp(2.2rem, 10vw, 4rem); 
            letter-spacing: 0.25em; 
            margin: 0; 
            font-weight: 300; 
            text-transform: uppercase;
        }

        /* DESKTOP-STYLE NAV FOR ALL DEVICES */
        nav { 
            display: flex; 
            justify-content: center; 
            gap: 1.5rem; 
            margin-top: 1.2rem;
            flex-wrap: wrap; /* Allows it to flow on smaller screens */
        }
        nav a { 
            text-decoration: none; 
            color: var(--white); 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            letter-spacing: 1.5px; 
            font-weight: 700;
            padding: 5px 0;
            border-bottom: 1px solid transparent;
            transition: border 0.3s ease;
        }
        nav a:active { border-bottom: 1px solid var(--white); }

        /* Hero */
        .hero-slider {
            width: 92%;
            max-width: 1400px;
            height: 75vh;
            margin: 2rem auto 4rem;
            position: relative;
            overflow: hidden;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            background-size: cover;
            background-position: center 20%;
        }
        .slide.active { opacity: 1; }

        .hero-content-box {
            position: absolute;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.98);
            padding: 1.2rem 2rem;
            border-radius: 8px;
            text-align: center;
            width: 70%;
            max-width: 280px;
            color: var(--dark-brown);
        }

        .hero-shop-link {
            display: inline-block;
            text-decoration: none;
            color: var(--white);
            background: var(--dark-brown);
            padding: 0.6rem 1.2rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            border-radius: 2px;
        }

        /* CENTERED MOBILE PRODUCTS */
        .products-section { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 1rem; box-sizing: border-box; }
        
        .products-grid { 
            display: flex;
            flex-direction: column;
            align-items: center; /* Forces everything to absolute center */
            justify-content: center;
            width: 100%;
            gap: 3rem; 
            margin-bottom: 6rem;
        }

        .product-card { 
            width: 100%; 
            max-width: 340px; /* Consistent card size */
            text-decoration: none; 
            color: var(--dark-brown); 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        .img-container { width: 100%; aspect-ratio: 4/5; overflow: hidden; }
        .product-image { width: 100%; height: 100%; object-fit: cover; }

        .product-info { padding: 1.5rem; text-align: center; }
        .product-info h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; margin: 0; font-weight: 600; }
        .shop-btn-text { 
            display: inline-block; margin-top: 8px; font-size: 0.65rem; 
            text-transform: uppercase; letter-spacing: 2px; font-weight: 700;
            color: var(--dark-brown); border-bottom: 2px solid var(--dark-brown);
        }

        footer { text-align: center; padding: 3rem 1rem; background: rgba(0,0,0,0.5); margin-top: 2rem; }
        footer p { font-size: 0.75rem; letter-spacing: 1px; line-height: 1.6; }

        .reveal { opacity: 0; transform: translateY(20px); transition: 0.6s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="announcement-bar">
        Free shipping for UK | Message satr.label
    </div>

    <header>
        <h1>Satr</h1>
        <nav id="nav-menu">
            <a href="index.html">Home</a>
            <a href="productsatr.html">Products</a>
            <a href="aboutme.html">About</a>
            <a href="cart.html">Cart</a>
        </nav>
    </header>

    <section class="hero-slider">
        <div id="hero-slider"></div>
        <div class="hero-content-box">
            <h3 id="hero-abaya-name" style="margin:0 0 10px; font-family:'Cormorant Garamond'; font-size: 1.6rem;">Sereen</h3>
            <a href="sereen.html" id="hero-abaya-link" class="hero-shop-link">Shop Piece</a>
        </div>
    </section>

    <main class="products-section">
        <div class="products-grid">
            <a href="sereen.html" class="product-card reveal">
                <div class="img-container"><img src="sareen4.jpeg" loading="lazy" class="product-image"></div>
                <div class="product-info"><h2>The Sereen</h2><span class="shop-btn-text">Shop Now</span></div>
            </a>
            <a href="flora.html" class="product-card reveal">
                <div class="img-container"><img src="flora1.jpeg" loading="lazy" class="product-image"></div>
                <div class="product-info"><h2>The Flora</h2><span class="shop-btn-text">Shop Now</span></div>
            </a>
            <a href="noor.html" class="product-card reveal">
                <div class="img-container"><img src="noor1.jpeg" loading="lazy" class="product-image"></div>
                <div class="product-info"><h2>The Noor</h2><span class="shop-btn-text">Shop Now</span></div>
            </a>
            <a href="sahara.html" class="product-card reveal">
                <div class="img-container"><img src="sahara1.jpeg" loading="lazy" class="product-image"></div>
                <div class="product-info"><h2>The Sahara</h2><span class="shop-btn-text">Shop Now</span></div>
            </a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Satr.<br>Handcrafted with love for the modern Muslimah.</p>
    </footer>

    <script>
        const heroData = [
            { name: 'Sereen', file: 'sareen3.jpeg', link: 'sereen.html' },
            { name: 'Flora',  file: 'flora1.jpeg',  link: 'flora.html'  },
            { name: 'Nila',   file: 'nila6.jpeg',   link: 'nila.html'   }
        ];

        const sliderContainer = document.getElementById('hero-slider');
        heroData.forEach((item, index) => {
            const slide = document.createElement('div');
            slide.className = 'slide' + (index === 0 ? ' active' : '');
            slide.style.backgroundImage = `url('${item.file}')`;
            sliderContainer.appendChild(slide);
        });

        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
            document.getElementById('hero-abaya-name').textContent = heroData[currentSlide].name;
            document.getElementById('hero-abaya-link').href = heroData[currentSlide].link;
        }, 4000);

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
